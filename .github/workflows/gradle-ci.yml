name: Java Gradle CI & Continuous Delivery 🚀

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deliver:
    runs-on: ubuntu-latest

    steps:
    # 1. Code checkout karna
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Java environment initialize karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Gradle tools configuration
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    # 4. Automate Build & Compile (Bina explicit server deployment ke code test aur pack karna)
    - name: Build and Package Application
      run: |
        chmod +x gradlew
        ./gradlew build

    # 5. Continuous Delivery (Auto Deploying artifact inside GitHub Storage)
    - name: Upload Production JAR to Github Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: java-production-build
        path: build/libs/*.jar
